<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canary Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Canary Monitor</h1>
    <span id="last-updated">Waiting for first check...</span>
  </header>

  <main id="dashboard">
    <!-- cards will be injected here by ui.js -->
  </main>
  <div id="alert-log"></div>

  <script type="module">
    import { startUI } from './ui.js'

    const worker = new Worker(new URL('./worker.js', import.meta.url), { type: 'module' })

    worker.onmessage = (event) => {
      if (event.data.type === 'update') {
        startUI(event.data.data)
      }
    } 
  </script>
</body>

</html>
