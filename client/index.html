<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canary Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Canary Monitor</h1>
    <span id="last-updated">Waiting for first check...</span>
  </header>

  <main id="dashboard">
    <!-- cards will be injected here by ui.js -->
  </main>
  <div id="alert-log"></div>

  <script type="module">
  import { startUI } from './ui.js'

  const wsUrl = location.hostname === 'localhost'
  ? 'ws://localhost:3001'
  : 'wss://canary-monitor-production.up.railway.app'

const ws = new WebSocket(wsUrl) 

  ws.onopen = () => {
    console.log('connected to server')
  }

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data)
    startUI(data)
  }

  ws.onclose = () => {
    console.log('disconnected from server')
  }
</script> 
</body>

</html>
